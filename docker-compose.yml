services:
  postgres-setup:
    image: pgvector/pgvector:pg15
    container_name: iam-postgres-setup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "
        psql -h lab-postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE iam_db;' || true &&
        echo 'DB iam_db ready.'
      "
    networks:
      - lab-network

  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: iam-service
    environment:
      DB_HOST: lab-postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: iam_db
      DB_SSLMODE: disable
      GIN_MODE: debug
      LOG_LEVEL: debug
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-me-in-production-min-32-chars}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - iam_go_mod_cache:/go/pkg/mod
    depends_on:
      - postgres-setup
    networks:
      - lab-network
    labels:
      - "logging=promtail"
      - "service_name=iam-service"

volumes:
  iam_go_mod_cache:
    driver: local

networks:
  lab-network:
    external: true
