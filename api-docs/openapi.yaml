openapi: 3.1.0
info:
  title: Multi-Tenant IAM API
  version: 1.0.0
  description: API para gestión de identidad y acceso multi-tenant

servers:
  - url: /iam/api/v1
    description: Base URL para la API v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant

  parameters:
    # Parámetros básicos de paginación y filtrado
    PageParam:
      name: page
      in: query
      description: "Número de página (default: 1)"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: page_size
      in: query
      description: "Tamaño de página (default: 10, max: 100)"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    SortByParam:
      name: sort_by
      in: query
      description: "Campo de ordenamiento (default: created_at)"
      required: false
      schema:
        type: string
        default: "created_at"

    SortDirParam:
      name: sort_dir
      in: query
      description: "Dirección de ordenamiento (asc o desc, default: desc)"
      required: false
      schema:
        type: string
        enum: ["asc", "desc"]
        default: "desc"

    # Parámetros específicos para usuarios
    UserTenantIdParam:
      name: tenant_id
      in: query
      description: ID del tenant
      required: false
      schema:
        type: string
        format: uuid

    UserStatusParam:
      name: status
      in: query
      description: Estado del usuario
      required: false
      schema:
        type: string
        enum: ["ACTIVE", "INACTIVE", "SUSPENDED", "DELETED"]

    UserRoleIdParam:
      name: role_id
      in: query
      description: ID del rol
      required: false
      schema:
        type: string
        format: uuid

    UserEmailParam:
      name: email
      in: query
      description: Búsqueda por email (LIKE)
      required: false
      schema:
        type: string

    UserFirstNameParam:
      name: first_name
      in: query
      description: Búsqueda por nombre (LIKE)
      required: false
      schema:
        type: string

    UserLastNameParam:
      name: last_name
      in: query
      description: Búsqueda por apellido (LIKE)
      required: false
      schema:
        type: string

    UserProviderParam:
      name: provider
      in: query
      description: Proveedor de autenticación
      required: false
      schema:
        type: string
        enum: ["LOCAL", "GOOGLE"]

    # Parámetros específicos para roles
    RoleTypeParam:
      name: type
      in: query
      description: Tipo de rol
      required: false
      schema:
        type: string
        enum: ["SYSTEM_ADMIN", "TENANT_ADMIN", "USER", "READ_ONLY", "CUSTOM"]

    RoleNameParam:
      name: name
      in: query
      description: Búsqueda por nombre (LIKE)
      required: false
      schema:
        type: string

    RoleSystemParam:
      name: system
      in: query
      description: Solo roles de sistema
      required: false
      schema:
        type: string
        enum: ["true"]

    RoleActiveParam:
      name: active
      in: query
      description: Solo roles activos
      required: false
      schema:
        type: string
        enum: ["true"]

    # Parámetros específicos para tenants
    TenantOwnerIdParam:
      name: owner_id
      in: query
      description: ID del propietario
      required: false
      schema:
        type: string
        format: uuid

    TenantTypeParam:
      name: type
      in: query
      description: Tipo de tenant
      required: false
      schema:
        type: string
        enum: ["PERSONAL", "STARTUP", "BUSINESS", "ENTERPRISE"]

    TenantPlanIdParam:
      name: plan_id
      in: query
      description: ID del plan
      required: false
      schema:
        type: string
        format: uuid

    TenantNameParam:
      name: name
      in: query
      description: Búsqueda por nombre (LIKE)
      required: false
      schema:
        type: string

    TenantSlugParam:
      name: slug
      in: query
      description: Búsqueda por slug (LIKE)
      required: false
      schema:
        type: string

    TenantDomainParam:
      name: domain
      in: query
      description: Búsqueda por dominio (LIKE)
      required: false
      schema:
        type: string

    TenantActiveParam:
      name: active
      in: query
      description: Solo tenants activos
      required: false
      schema:
        type: string
        enum: ["true"]

    # Parámetros específicos para planes
    PlanTypeParam:
      name: type
      in: query
      description: Tipo de plan
      required: false
      schema:
        type: string
        enum: ["FREE", "BASIC", "PREMIUM", "ENTERPRISE"]

    PlanCurrencyParam:
      name: currency
      in: query
      description: Moneda del plan
      required: false
      schema:
        type: string

    PlanMinPriceParam:
      name: min_price
      in: query
      description: Precio mínimo
      required: false
      schema:
        type: number
        format: float

    PlanMaxPriceParam:
      name: max_price
      in: query
      description: Precio máximo
      required: false
      schema:
        type: number
        format: float

    PlanActiveParam:
      name: active
      in: query
      description: Solo planes activos
      required: false
      schema:
        type: string
        enum: ["true"]

  schemas:
    # Respuesta genérica de listado
    ListResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    # Respuestas específicas usando ListResponse
    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer

    RoleListResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleResponse'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    TenantListResponse:
      type: object
      properties:
        tenants:
          type: array
          items:
            $ref: '#/components/schemas/TenantResponse'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        pagination:
          type: object
          properties:
            offset:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            has_next:
              type: boolean
            has_prev:
              type: boolean
            total_pages:
              type: integer

    PlanListResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/PlanResponse'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    # Request/Response schemas
    LoginRequest:
      type: object
      required:
        - email
        - provider
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Requerido si provider=LOCAL
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
        google_token:
          type: string
          description: Requerido si provider=GOOGLE
        tenant_id:
          type: string
          format: uuid
          description: Opcional, para asociar login a un tenant

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
        user:
          $ref: '#/components/schemas/UserData'

    UserData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tenant_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, DELETED]

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    ValidateTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tenant_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid

    RevokeAllResponse:
      type: object
      properties:
        message:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tenant_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, DELETED]
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
        federated_id:
          type: string
          description: ID externo para proveedores OAuth
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
        - email
        - tenant_id
        - role_id
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          description: Requerido para usuarios con provider=LOCAL
        tenant_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
          default: LOCAL

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, DELETED]

    TenantResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [PERSONAL, STARTUP, BUSINESS, ENTERPRISE]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, DELETED]
        owner_id:
          type: string
          format: uuid
        domain:
          type: string
        plan_id:
          type: string
          format: uuid
          nullable: true
        max_users:
          type: integer
        user_count:
          type: integer
        settings:
          type: object
          additionalProperties: true
        features:
          type: object
          properties:
            friends_family:
              type: boolean
            premium_analytics:
              type: boolean
        subscribed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          readOnly: true
        can_access:
          type: boolean
          readOnly: true
        is_expired:
          type: boolean
          readOnly: true
        can_add_user:
          type: boolean
          readOnly: true
        has_plan:
          type: boolean
          readOnly: true
        has_custom_domain:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTenantRequest:
      type: object
      required:
        - name
        - slug
        - type
        - owner_id
        - description
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
          minLength: 2
          maxLength: 50
        description:
          type: string
          minLength: 5
          maxLength: 500
        type:
          type: string
          enum: [PERSONAL, STARTUP, BUSINESS, ENTERPRISE]
        owner_id:
          type: string
          format: uuid
        domain:
          type: string
          format: hostname

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          minLength: 5
          maxLength: 500
        domain:
          type: string
          format: hostname
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
        max_users:
          type: integer
          minimum: -1

    SetPlanRequest:
      type: object
      required:
        - plan_id
      properties:
        plan_id:
          type: string
          format: uuid

    UpdateTenantFeaturesRequest:
      type: object
      properties:
        friends_family:
          type: boolean
        premium_analytics:
          type: boolean

    RoleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [SYSTEM_ADMIN, TENANT_ADMIN, USER, READ_ONLY, CUSTOM]
        tenant_id:
          type: string
          format: uuid
          nullable: true
        permissions:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        is_system:
          type: boolean
        is_tenant:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRoleRequest:
      type: object
      required:
        - name
        - description
        - type
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          minLength: 5
          maxLength: 500
        type:
          type: string
          enum: [SYSTEM_ADMIN, TENANT_ADMIN, USER, READ_ONLY, CUSTOM]
        tenant_id:
          type: string
          format: uuid
          description: Requerido para roles de tenant
        permissions:
          type: array
          items:
            type: string

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          minLength: 5
          maxLength: 500
        permissions:
          type: array
          items:
            type: string

    PlanResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [FREE, BASIC, PREMIUM, ENTERPRISE]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        max_users:
          type: integer
        price_month:
          type: number
          format: float
        price_year:
          type: number
          format: float
        yearly_discount:
          type: number
          format: float
        features:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePlanRequest:
      type: object
      required:
        - name
        - description
        - type
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          minLength: 10
          maxLength: 500
        type:
          type: string
          enum: [FREE, BASIC, PREMIUM, ENTERPRISE]
        price_month:
          type: number
          format: float
          minimum: 0
        price_year:
          type: number
          format: float
          minimum: 0
        features:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string

paths:
  /auth/login:
    post:
      summary: Iniciar sesión
      description: Autentica un usuario con credenciales locales o token de Google
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      summary: Refrescar token de acceso
      description: Genera un nuevo token de acceso usando el refresh token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refrescado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Refresh token inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/validate:
    get:
      summary: Validar token de acceso
      description: Valida un token JWT y retorna sus claims
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token válido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateTokenResponse'
        '401':
          description: Token inválido o no proporcionado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Cerrar sesión
      description: Invalida todos los refresh tokens del usuario
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Sesión cerrada exitosamente
        '401':
          description: Usuario no autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/revoke-all:
    post:
      summary: Revocar todos los tokens
      description: Revoca todos los tokens activos para el usuario autenticado
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Todos los tokens han sido revocados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAllResponse'
        '401':
          description: Usuario no autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      summary: Listar usuarios con filtros y paginación
      description: Lista usuarios del tenant actual con filtros avanzados, ordenamiento y paginación
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - $ref: '#/components/parameters/UserTenantIdParam'
        - $ref: '#/components/parameters/UserStatusParam'
        - $ref: '#/components/parameters/UserRoleIdParam'
        - $ref: '#/components/parameters/UserEmailParam'
        - $ref: '#/components/parameters/UserFirstNameParam'
        - $ref: '#/components/parameters/UserLastNameParam'
        - $ref: '#/components/parameters/UserProviderParam'
      responses:
        '200':
          description: Lista paginada de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          description: Parámetros de filtrado inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Sin permisos para acceder a usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Crear nuevo usuario
      description: Crea un nuevo usuario en el tenant
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Datos de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Usuario ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      summary: Obtener usuario por ID
      description: Obtiene un usuario específico por su ID
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: ID de usuario inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar usuario
      description: Actualiza un usuario existente
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Datos de entrada inválidos o estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email ya está en uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
